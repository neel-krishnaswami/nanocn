// --- Source code ---
const SOURCE = `sort list(a) = { Nil : () | Cons : (a * list(a)) }

fun append : (list(int) * list(int)) -> list(int) [spec] = {
    (Nil (), ys) -> ys
  | (Cons (x, xs), ys) -> Cons (x, append (xs, ys))
}

fun split : list(int) -> (list(int) * list(int)) [spec] = {
    Nil () -> (Nil (), Nil ())
  | Cons (x, Nil ()) -> (Cons (x, Nil ()), Nil ())
  | Cons (x, Cons (y, rest)) ->
      let (xs, ys) = split rest;
      (Cons (x, xs), Cons (y, ys))
}

fun merge : (list(int) * list(int)) -> list(int) [spec] = {
    (Nil (), ys) -> ys
  | (xs, Nil ()) -> xs
  | (Cons (x, xs), Cons (y, ys)) ->
      if x <= y then
        Cons (x, merge (xs, Cons (y, ys)))
      else
        Cons (y, merge (Cons (x, xs), ys))
}

fun mergesort : list(int) -> list(int) [spec] = {
    Nil () -> Nil ()
  | Cons (x, Nil ()) -> Cons (x, Nil ())
  | xs ->
      let (left, right) = split xs;
      merge (mergesort left, mergesort right)
}

main : () [impure] = ()`;

  let (_v1, _v2) = _v0;

    Nil _v3 ->

      let ys = _v2;
      ys
    | Cons _v4 ->
      let (_v5, _v6) = _v4;
      let x = _v5;
      let xs = _v6;
      let ys = _v2;
      Cons (x, append (xs, ys))
  }

fun split (_v0 : list(int)) : (list(int) * list(int)) [spec] =
  case _v0 {
    Nil _v1 ->
      let () = _v1;
      (Nil (), Nil ())
    | Cons _v2 ->
      let (_v3, _v4) = _v2;
      case _v4 {
        Nil _v5 ->
          let () = _v5;
          let x = _v3;
          (Cons (x, Nil ()), Nil ())

          let (_v7, _v8) = _v6;
          let x = _v3;
          let y = _v7;
          let rest = _v8;

          let (_v10, _v11) = _v9;

fun merge (_v0 : (list(int) * list(int))) : list(int) [spec] =
  let (_v1, _v2) = _v0;
  case _v1 {
    Nil _v4 ->
      let () = _v4;
      case _v2 {
        Nil _v6 ->
          let () = _v6;
          let ys = _v2;
          ys
        | Cons _v8 ->

          ys

    | Cons _v10 ->

      case _v2 {
        Nil _v15 ->

          else
            Cons (y, merge (Cons (x, xs), ys))
      }
  }

fun mergesort (_v0 : list(int)) : list(int) [spec] =
  case _v0 {
    Nil _v2 ->
      let () = _v2;
      Nil ()

          let (_v14, _v15) = _v13;
          let left = _v14;
          let right = _v15;
          merge (mergesort left, mergesort right)

main : () [impure] = ()`;

// --- Render source with per-character spans for highlighting ---
function renderSource(text, container) {
  const lines = text.split('\n');
  lines.forEach((line, i) => {
    const lineNum = i + 1;
    const lineEl = document.createElement('span');
    lineEl.className = 'src-line';
    lineEl.dataset.line = lineNum;

    // Wrap each character in a span for precise highlighting
    for (let c = 0; c < line.length; c++) {
      const ch = document.createElement('span');
      ch.textContent = line[c];
      ch.dataset.line = lineNum;
      ch.dataset.col = c;
      ch.id = `src-${lineNum}-${c}`;
      lineEl.appendChild(ch);
    }
    lineEl.appendChild(document.createTextNode('\n'));
    container.appendChild(lineEl);
  });
}

// --- Render core with syntax highlighting and binder spans ---
function renderCore(text, container) {
  const lines = text.split('\n');
  // Build a map: for each function, track which binder index we're on
  const binderCounters = {};

  // We need to find "let <name> =" patterns in the core and wrap <name> in a span
  // Also find "fun <fname> (<param>" patterns
  let binderIdx = 0;
  let currentFunc = null;

  lines.forEach((line, lineIdx) => {
    const lineEl = document.createElement('span');
    lineEl.className = 'src-line';

    // Detect function header
    const funMatch = line.match(/^fun (\w+)/);
    if (funMatch) {
      currentFunc = funMatch[1];
    }

    // Tokenize and highlight
    let pos = 0;
    const tokens = tokenize(line);
    tokens.forEach(tok => {
      if (tok.type === 'binder' && currentFunc) {
        // Find matching BINDER entry
        const key = currentFunc + ':' + tok.text;
        if (!binderCounters[key]) binderCounters[key] = 0;
        const idx = binderCounters[key]++;

        // Find the binder in our list
        const match = findBinder(currentFunc, tok.text, idx);
        if (match) {
          const span = document.createElement('span');
          const isGen = match.gen;
          span.className = isGen ? 'gen-binder' : 'core-binder binder';
          span.textContent = tok.text;
          span.dataset.binderId = match.id;
          span.dataset.srcLine = match.srcLine;
          span.dataset.srcStart = match.srcStart;
          span.dataset.srcEnd = match.srcEnd;
          span.dataset.gen = isGen ? '1' : '0';
          lineEl.appendChild(span);
          return;
        }
      }

      const span = document.createElement('span');
      span.className = tok.cls || '';
      span.textContent = tok.text;
      lineEl.appendChild(span);
    });

    lineEl.appendChild(document.createTextNode('\n'));
    container.appendChild(lineEl);
  });
}

function findBinder(func, name, occurrence) {
  let count = 0;
  for (const b of BINDERS) {
    if (b.func === func && b.name === name) {
      if (count === occurrence) return b;
      count++;
    }
  }
  return null;
}

function tokenize(line) {
  const tokens = [];
  const keywords = new Set(['let', 'fun', 'case', 'if', 'then', 'else', 'sort', 'type', 'main', 'iter', 'take', 'return']);
  const ctors = new Set(['Nil', 'Cons', 'Next', 'Done']);
  const types = new Set(['int', 'bool', 'ptr', 'list', 'step', 'spec', 'impure', 'pure', 'pred']);
  const ops = new Set(['=', '->', '|', ':', '*', '<=', '>=', '<', '>', '+', '&&', '||', '==']);

  // Check if this is a "let <name> =" line to identify binders
  const letMatch = line.match(/^(\s*)(let)\s+(\(?)/);
  const isLetLine = !!letMatch;

  let i = 0;
  while (i < line.length) {
    // Whitespace
    if (line[i] === ' ' || line[i] === '\t') {
      let j = i;
      while (j < line.length && (line[j] === ' ' || line[j] === '\t')) j++;
      tokens.push({ text: line.substring(i, j), type: 'ws', cls: '' });
      i = j;
      continue;
    }

    // Word
    if (/[a-zA-Z_]/.test(line[i])) {
      let j = i;
      while (j < line.length && /[a-zA-Z0-9_]/.test(line[j])) j++;
      const word = line.substring(i, j);

      if (keywords.has(word)) {
        tokens.push({ text: word, type: 'kw', cls: 'kw' });
        // After 'let', look for the binder name
        if (word === 'let') {
          // Skip whitespace
          let k = j;
          while (k < line.length && line[k] === ' ') k++;
          if (k < line.length && line[k] === '(') {
            // let (a, b) = ... - tuple destructuring, handle parens
            tokens.push({ text: line.substring(j, k+1), type: 'ws', cls: '' });
            k++;
            // Parse comma-separated binder names inside parens
            while (k < line.length && line[k] !== ')') {
              while (k < line.length && (line[k] === ' ' || line[k] === ',')) {
                tokens.push({ text: line[k], type: 'punct', cls: '' });
                k++;
              }
              if (k < line.length && /[a-zA-Z_]/.test(line[k])) {
                let m = k;
                while (m < line.length && /[a-zA-Z0-9_]/.test(line[m])) m++;
                const bname = line.substring(k, m);
                const bcls = bname.startsWith('_v') ? 'gen-var' : 'binder';
                tokens.push({ text: bname, type: 'binder', cls: bcls });
                k = m;
              }
            }
            if (k < line.length && line[k] === ')') {
              tokens.push({ text: ')', type: 'punct', cls: '' });
              k++;
            }
            i = k;
            continue;
          } else if (k < line.length && /[a-zA-Z_]/.test(line[k])) {
            // let name = ...
            let m = k;
            while (m < line.length && /[a-zA-Z0-9_]/.test(line[m])) m++;
            const bname = line.substring(k, m);
            tokens.push({ text: line.substring(j, k), type: 'ws', cls: '' });
            if (bname === '()') {
              tokens.push({ text: bname, type: 'unit', cls: '' });
            } else {
              const bcls = bname.startsWith('_v') ? 'gen-var' : 'binder';
              tokens.push({ text: bname, type: 'binder', cls: bcls });
            }
            i = m;
            continue;
          }
        }
      } else if (ctors.has(word)) {
        tokens.push({ text: word, type: 'ctor', cls: 'ctor' });
      } else if (types.has(word)) {
        tokens.push({ text: word, type: 'type', cls: 'type-name' });
      } else if (word.startsWith('_v')) {
        // Check if this _v is in a binding position:
        // after 'fun name (', after a constructor in case, or after 'let'
        const prevNonWs2 = tokens.filter(t => t.type !== 'ws').slice(-1)[0];
        if (prevNonWs2 && (prevNonWs2.text === '(' || prevNonWs2.type === 'ctor')) {
          tokens.push({ text: word, type: 'binder', cls: 'gen-var' });
        } else {
          tokens.push({ text: word, type: 'gen-var', cls: 'gen-var' });
        }
      } else {
        // Check if this is a function name after 'fun'
        const prevNonWs = tokens.filter(t => t.type !== 'ws').slice(-1)[0];
        if (prevNonWs && prevNonWs.text === 'fun') {
          tokens.push({ text: word, type: 'fn-name', cls: 'fn-name' });
        } else {
          tokens.push({ text: word, type: 'ident', cls: '' });
        }
      }
      i = j;
      continue;
    }

    // Numbers
    if (/[0-9]/.test(line[i])) {
      let j = i;
      while (j < line.length && /[0-9]/.test(line[j])) j++;
      tokens.push({ text: line.substring(i, j), type: 'num', cls: 'num' });
      i = j;
      continue;
    }

    // Multi-char operators
    if (i + 1 < line.length) {
      const two = line.substring(i, i+2);
      if (ops.has(two)) {
        tokens.push({ text: two, type: 'op', cls: 'op' });
        i += 2;
        continue;
      }
    }

    // Single char
    tokens.push({ text: line[i], type: 'punct', cls: line[i] === '|' ? 'op' : '' });
    i++;
  }
  return tokens;
}

// --- Arrow drawing ---
const svg = document.getElementById('arrow-svg');
let activePath = null;
let activeCircles = [];
let activeHighlights = [];
let activeBinder = null;

function clearArrow() {
  if (activePath) {
    activePath.remove();
    activePath = null;
  }
  activeCircles.forEach(c => c.remove());
  activeCircles = [];
  activeHighlights.forEach(el => {
    el.classList.remove('src-highlight');
    el.classList.remove('src-highlight-gen');
  });
  activeHighlights = [];
  if (activeBinder) {
    activeBinder.classList.remove('active');
    activeBinder = null;
  }
}

function drawArrow(fromEl, toEls, isGen) {
  clearArrow();

  const fromRect = fromEl.getBoundingClientRect();
  const fromX = fromRect.left + fromRect.width / 2;
  const fromY = fromRect.top + fromRect.height / 2;

  const hlClass = isGen ? 'src-highlight-gen' : 'src-highlight';
  const color = isGen ? '#cba6f7' : '#f9e2af';

  // Highlight source characters
  toEls.forEach(el => {
    el.classList.add(hlClass);
    activeHighlights.push(el);
  });

  if (toEls.length === 0) return;

  // Target: center of highlighted region
  const firstRect = toEls[0].getBoundingClientRect();
  const lastRect = toEls[toEls.length - 1].getBoundingClientRect();
  const toX = (firstRect.left + lastRect.right) / 2;
  const toY = firstRect.top + firstRect.height / 2;

  // Draw bezier curve
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const midX = (fromX + toX) / 2;

  // Control points: curve upward then across
  const dx = Math.abs(fromX - toX);
  const dy = fromY - toY;
  const cpOffset = Math.min(80, dx * 0.3);

  const d = `M ${fromX} ${fromY} C ${fromX - cpOffset} ${fromY - Math.abs(dy) * 0.3}, ${toX + cpOffset} ${toY - Math.abs(dy) * 0.3}, ${toX} ${toY}`;

  path.setAttribute('d', d);
  path.setAttribute('stroke', color);
  path.setAttribute('marker-end', isGen ? 'url(#arrowhead-gen)' : 'url(#arrowhead)');
  path.classList.add('visible');
  svg.appendChild(path);
  activePath = path;

  // Dots at endpoints
  [{ x: fromX, y: fromY }, { x: toX, y: toY }].forEach(pt => {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', pt.x);
    circle.setAttribute('cy', pt.y);
    circle.setAttribute('r', 3);
    circle.setAttribute('fill', color);
    circle.classList.add('visible');
    svg.appendChild(circle);
    activeCircles.push(circle);
  });

  // Mark binder active
  fromEl.classList.add('active');
  activeBinder = fromEl;
}

// --- Initialize ---
const sourcePre = document.getElementById('source-pre');
const corePre = document.getElementById('core-pre');

renderSource(SOURCE, sourcePre);
renderCore(CORE, corePre);

// Attach hover listeners to both user binders and generated binders
document.querySelectorAll('.core-binder, .gen-binder').forEach(el => {
  el.addEventListener('mouseenter', () => {
    const srcLine = parseInt(el.dataset.srcLine);
    const srcStart = parseInt(el.dataset.srcStart);
    const srcEnd = parseInt(el.dataset.srcEnd);
    const isGen = el.dataset.gen === '1';

    // Find source character spans
    const targets = [];
    for (let c = srcStart; c < srcEnd; c++) {
      const target = document.getElementById(`src-${srcLine}-${c}`);
      if (target) targets.push(target);
    }

    if (targets.length > 0) {
      // Scroll source pane to show the target
      const sourcePane = document.getElementById('source-pane');
      const targetTop = targets[0].offsetTop;
      const paneHeight = sourcePane.clientHeight;
      if (targetTop < sourcePane.scrollTop || targetTop > sourcePane.scrollTop + paneHeight - 40) {
        sourcePane.scrollTo({ top: Math.max(0, targetTop - paneHeight / 3), behavior: 'smooth' });
      }

      drawArrow(el, targets, isGen);
    }
  });

  el.addEventListener('mouseleave', () => {
    clearArrow();
  });
});

// Redraw on scroll (arrows are in fixed position)
document.getElementById('source-pane').addEventListener('scroll', clearArrow);
document.getElementById('core-pane').addEventListener('scroll', clearArrow);
</script>
